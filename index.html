<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷战热斗卡牌制作器 正式版</title>
    <style>
        /* ==================== 1. 字体定义 (Fonts) ==================== */
        
        /* [NEW] 1. 汉仪粗仿宋简 (全量版) - 用于卡号 */
        @font-face { 
            font-family: 'HanYiCuFangSong'; 
            src: url('fonts/HanYiCuFangSongJian-1.ttf'); 
            font-weight: normal; 
        }

        /* [NEW] 2. 汉仪粗仿宋简 (仅数字版) - 用于正文数字混排 */
        /* unicode-range: U+0030-0039 锁定数字 0-9 */
        @font-face { 
            font-family: 'HanYiNumOnly'; 
            src: url('fonts/HanYiCuFangSongJian-1.ttf'); 
            font-weight: normal; 
            unicode-range: U+0030-0039;
        }

        /* 行动点数专用 (保持不变) */
        @font-face { font-family: 'OpsFont'; src: url('fonts/FRADM.ttf'); font-weight: normal; }
        /* 英文标题专用 */
        @font-face { font-family: 'TitleFont'; src: url('fonts/FRADMCN.ttf'); font-weight: bold; }
        /* 卡牌正文/通用 (回退字体) */
        @font-face { font-family: 'CardMSYH'; src: url('fonts/FRADMCN.ttf'); font-weight: normal; }
        
        /* 汉化组专用字体 */
        @font-face { font-family: 'CN_Title'; src: url('fonts/ZhuLangMaLieDaKaiTi-2.ttf'); font-weight: bold; }
        @font-face { font-family: 'CN_Body'; src: url('fonts/ZhuLangMaLieDaKaiTi-2.ttf'); font-weight: normal; }
        @font-face { font-family: 'CN_Id'; src: url('fonts/AaBanSong.ttf'); font-weight: normal; }
        @font-face { font-family: 'CN_Kai'; src: url('fonts/ZhuLangMaLieDaKaiTi-2.otf'); font-weight: normal; }

        /* ==================== 2. 全局样式 (Global) ==================== */
        :root {
            --bg-dark: #1e1e2f;
            --bg-darker: #111;
            --primary-red: #ab1f23;
            --primary-red-hover: #8a191c;
            --text-light: #fff;
            --text-dark: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #2a2a40 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark);
        }

        h1 { color: var(--text-light); text-align: center; margin-bottom: 5px; font-size: 26px; }
        h2 { color: #888; text-align: center; font-size: 14px; margin-bottom: 20px; }

        /* ==================== 3. 布局容器 (Layout) ==================== */
        .main-container {
            display: flex; gap: 40px; flex-wrap: wrap;
            justify-content: center; align-items: flex-start;
        }

        /* 左侧控制面板 */
        .control-panel {
            background: white; border-radius: 8px; padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 480px; height: 90vh; overflow-y: auto;
            display: flex; flex-direction: column;
        }

        /* 右侧预览区域 */
        .preview-wrapper {
            background: var(--bg-darker); padding: 20px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            width: 450px; height: 600px; overflow: hidden; position: relative;
        }
        #preview-scale-container {
            transform: scale(0.5); transform-origin: center center;
            width: 736px; height: 1024px;
        }

        /* ==================== 4. 表单组件 (Components) ==================== */
        .section-title {
            background: var(--primary-red); color: white;
            padding: 8px 12px; font-weight: bold; font-size: 14px;
            margin: 15px 0 10px 0; border-radius: 4px;
        }

        .form-row { display: flex; margin-bottom: 8px; align-items: center; }
        .form-row label { width: 90px; font-size: 13px; font-weight: bold; flex-shrink: 0; }
        .form-row .input-wrap { flex: 1; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

        input[type="text"], input[type="number"], textarea, select {
            width: 100%; padding: 8px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px;
        }
        textarea { resize: vertical; }
        input[type="checkbox"], input[type="radio"] { width: auto; margin-right: 5px; }

        .btn-mini {
            padding: 5px 10px; background: #eee; border: 1px solid #ccc;
            cursor: pointer; border-radius: 4px; font-size: 12px; font-weight: bold;
        }
        .btn-mini:hover { background: #ddd; }

        .btn-bold-tool {
            background: #333; color: #fff; border: none; padding: 8px 12px;
            border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 10px;
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 5px;
            font-size: 14px;
        }
        .btn-bold-tool:hover { background: #555; }

        .action-btn {
            width: 100%; padding: 15px; background: var(--primary-red); color: white;
            border: none; border-radius: 6px; font-size: 18px; font-weight: bold;
            cursor: pointer; margin-top: 20px; transition: background 0.2s;
        }
        .action-btn:hover { background: var(--primary-red-hover); }
        .action-btn:disabled { background: #666; cursor: not-allowed; }

        .hidden { display: none !important; }
        .dynamic-row-item { display: flex; align-items: center; gap: 5px; width: 100%; margin-bottom: 5px;}
        .info-box { margin-bottom: 8px; padding: 5px; background: #eef; font-size: 12px; border-radius: 4px; }


        /* ==================== 4.x 布局微调工具 (Layout Tuner) ==================== */
        .tuner-inline { width: 100%; display: flex; align-items: center; gap: 10px; flex-wrap: nowrap; }
        .tuner-inline input[type="range"] { flex: 1; }
        .tuner-inline input[type="number"] { width: 90px; }
        .tuner-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .tuner-help { margin: -4px 0 10px 0; padding: 8px 10px; background: #f7f7f7; color: #555; font-size: 12px; border-radius: 4px; line-height: 1.5; }

        .asset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .asset-item { display: flex; flex-direction: column; gap: 5px; }
        .asset-item label { font-size: 12px; color: #666; }

        /* ==================== 5. 卡牌核心样式 (Card Internals) ==================== */
        .card-frame {
            width: 736px; height: 1024px; position: relative;
            background-color: #f4f4f4; overflow: hidden;
            border-radius: 35px; box-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-family: 'CardMSYH', sans-serif;
            transform-origin: top left;
        }
        .card-frame.type-scoring { background-color: #ffffff; }

        /* 噪点纹理 */
        .texture-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 100;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='1'/%3E%3C/svg%3E");
            mix-blend-mode: overlay; opacity: 0.15;
        }
        .type-scoring .texture-overlay { display: none; }

        /* 元素：卡号 */
		.el-id {
			position: absolute; width: 100%; text-align: center;
			/* [修改] 卡号略微放大，以接近原卡视觉比例 */
			font-size: 44px; font-weight: normal; color: #333; z-index: 20;
            opacity: 0.95; mix-blend-mode: multiply;
            /* [修改] 卡号直接使用新字体 (全量) */
            font-family: 'HanYiCuFangSong', 'CN_Id', sans-serif;
        }
        .type-event .el-id { top: 20px; }
        .type-scoring .el-id { top: 30px; }

        /* 元素：阶段条 */
        .el-phase-bar {
            position: absolute; left: 35px; width: 666px; height: 72px;
            background: #ccc; 
            /* [修改] 确保阶段条在图片之上 (图片现在是4，这个是5) */
            z-index: 5;
            display: flex; align-items: center; justify-content: center;
        }
        .type-event .el-phase-bar { top: 67px; }
        .type-scoring .el-phase-bar { top: 80px; }

        .el-phase-img { height: 44px; width: auto; will-change: transform; -webkit-user-drag: none; user-select: none; }

        /* [NEW] 拖拽微调高亮（仅预览用，导出时会自动移除） */
        .tune-highlight { outline: 2px dashed #00bfff; outline-offset: 6px; cursor: move; touch-action: none; }

        /* ========== 【修复】阶段文字位置调整 - 针对每个时期单独设置 ========== */
        /* EARLY WAR (390px宽) - 需要右移让文字居中偏右 */
        .type-event.phase-0 .el-phase-img { 
            margin-left: 175px; 
        }

        /* MID WAR (276px宽) - 最窄，需要大幅右移 */
        .type-event.phase-1 .el-phase-img { 
            margin-left: 175px; 
        }

        /* LATE WAR (373px宽) - 需要右移 */
        .type-event.phase-2 .el-phase-img { 
            margin-left: 175px; 
        }
        /* 元素：行动力星星 */
        .el-star-box {
            position: absolute; width: 160px; height: 160px;
            z-index: 30; display: flex; align-items: center; justify-content: center;
        }
        .type-event .el-star-box { top: 35px; left: 50px; }
        .type-scoring .el-star-box { top: 45px; left: 80px; }

        .el-star-img { width: 100%; height: 100%; object-fit: contain; position: absolute; }
        
        /* [保持] 行动点数 (数字) 保持 OpsFont 不变 */
        .el-ops-num {
            position: relative; z-index: 31; 
            font-family: 'OpsFont', sans-serif;
            font-size: 88px; color: #fff; text-shadow: 4px 4px 0 #000;
            margin-top: 5px; letter-spacing: -3px;
        }

        /* [NEW] 单独微调：点数为 4 时的字形视觉居中补偿（不影响 1-3） */
        .el-ops-num.ops-num-4 {
            transform: translate(-6px, -1px);
        }


        /* 元素：事件主图 */
        .el-img-box {
            position: absolute; top: 139px; left: 35px; width: 666px; height: 340px;
            /* [修改 2] 修复图片样式：移除混色，调整层级 */
            /* mix-blend-mode: multiply; <--- 移除此行，消除染色 */
            background: transparent; /* [修改] contain 模式空白处不再铺白底 */
            z-index: 4; /* 设置层级：底图 < 图片(4) < 阶段条(5) < 星星(30) */
            
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* [NEW] 图片适配模式背景控制：
           - contain：不填满区域保持透明（露出卡底）
           - cover：保持白底（不影响现有透明 PNG 表现） */
        .el-img-box.img-fit-contain { background: transparent; }
        .el-img-box.img-fit-cover { background: #fff; }

        .el-main-img { width: 100%; height: 100%; display: block; }
        .el-img-placeholder {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            color: #666; cursor: pointer; font-size: 20px; flex-direction: column; background: #ddd;
        }

        /* 元素：标题栏 */
        .el-title-bar {
            /* [修改] 消除主图与标题栏之间缝隙：主图 top=139, height=340 => bottom=479 */
            position: absolute; top: 479px; left: 35px; width: 666px; height: 72px;
            
            background: #111; z-index: 10; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        .el-title-wrapper { display: flex; flex-direction: column; align-items: center; width: fit-content; max-width: 95%; height: 100%; justify-content: flex-end; padding: 0 35px 6px; }
        .el-title-text {
            color: #fff; font-family: 'CN_Title', 'TitleFont', sans-serif;
            font-size: 60px; font-weight: bold; text-transform: uppercase;
            text-align: center; line-height: 0.95; white-space: nowrap; width: auto;
        }
        .el-title-line { height: 3px; background: #fff; margin-top: 3px; width: 100%; }

        /* 元素：事件文本 */
        .el-text-area {
            position: absolute; top: 570px; left: 35px; width: 666px; bottom: 130px;
            text-align: center; color: #222;
            /* [修改] 使用混排：HanYiNumOnly (仅数字) + CN_Body (汉字) */
            font-family: 'HanYiNumOnly', 'CN_Body', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }
        .txt-block { width: 100%; padding: 0 10px; }
        .txt-pre, .txt-post { font-style: italic; margin-bottom: 10px; line-height: 1.35; margin-top: 15px;}
        .txt-event { margin-bottom: 0; line-height: 1.2; }
        .bold { font-weight: bold; text-decoration: none; } /* 加粗但不加下划线 */

        /* [NEW] 数字加粗（不影响中文） */
        .num-bold { font-weight: 900; text-decoration: none; }
        /* [NEW] 卡号加粗 */
        .id-bold { font-weight: 900; text-decoration: none; }


        /* 元素：计分牌内容 */
        .el-scoring-box {
            position: absolute; top: 180px; left: 35px; width: 666px; height: 740px;
            z-index: 40; display: flex; flex-direction: column;
            /* [修改] 计分牌整体使用混排 */
            font-family: 'HanYiNumOnly', 'CN_Body', sans-serif;
        }
        .score-row {
            width: 100%; display: flex; align-items: center; justify-content: center;
            text-align: center; position: relative; border-bottom: 2px solid rgba(0,0,0,0.15);
        }
        .score-row:last-child { border-bottom: none; }
        
        .score-header {
            min-height: 140px; flex-grow: 0; padding-top: 0; z-index: 42;
            flex-direction: column; font-size: 64px; font-weight: bold; line-height: 1.1;
            /* 标题部分若有数字也混排，但汉字保持 Title 字体 */
            font-family: 'HanYiNumOnly', 'CN_Title', 'TitleFont', sans-serif; color: #222;
        }

        /* [NEW] 计分牌标题微调承载容器（仅用于布局微调，不改变默认布局） */
        .score-header-inner { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }

        .score-sub { 
            font-size: 32px; font-weight: normal; margin-top: 5px; 
            /* 副标题使用混排 */
            font-family: 'HanYiNumOnly', 'CN_Body', sans-serif; 
        }
        
        .score-item {
            padding: 8px 15px; z-index: 41; color: #000;
            white-space: pre-wrap; word-break: break-all;
        }

        /* 元素：底部 Footer */
        .footer-container {
            position: absolute; bottom: 28px; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            z-index: 50; gap: 22px; pointer-events: none;
        }
        .el-footer-rem-text {
            color: var(--primary-red); font-weight: bold; font-size: 26px; text-align: center;
            font-family: 'CN_Body', sans-serif; mix-blend-mode: multiply; letter-spacing: 0.5px;
        }
        
.el-footer-hold-banner {
    background: var(--primary-red);
    color: #F2D45C; /* 原卡样式：黄色文字 */
    padding: 8px 28px;
    font-family: 'TitleFont', sans-serif;
    font-size: 40px; /* 原卡样式：更大字号（无需手动调） */
    font-weight: bold;
    letter-spacing: 1px;
    position: relative;
    box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.el-footer-hold-banner::after {
    content:''; position: absolute; bottom: -10px; left: 50%; margin-left: -10px;
    border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 10px solid var(--primary-red);
}
    </style>
</head>
<body>
    <h1>冷战热斗卡牌制作器 正式版</h1>
    <h2>社区发布版：事件牌制作 / 素材自定义 / 全元素布局微调</h2>

    <div class="main-container">
        <div class="control-panel" id="controlPanel">
            <div class="section-title">基础设置</div>
            <div class="form-row"><label>类型</label><div class="input-wrap"><select id="type"><option value="normal" selected>事件牌</option></select></div></div>
            <div class="form-row"><label>时代</label><div class="input-wrap"><select id="era"><option value="0">Early War</option><option value="1">Mid War</option><option value="2">Late War</option></select></div></div>
            <div class="form-row"><label>阵营</label><div class="input-wrap"><select id="side"><option value="0">USSR</option><option value="1">USA</option><option value="2">Neutral</option></select></div></div>
            <div class="form-row"><label>卡号</label><div class="input-wrap"><input type="text" id="cardId" value="7"></div></div>
            <div class="form-row"><label>点数</label><div class="input-wrap"><input type="text" id="ops" value="2"></div></div>

            <div class="section-title">布局微调 (实时)</div>
            <div class="tuner-help">选择目标后可用 X / Y / 缩放滑块精细调整，也可开启“拖拽调整”直接在预览区拖动。</div>
            <div class="form-row">
                <label>目标</label>
                <div class="input-wrap">
                    <select id="tuneTarget" style="width: 260px;">
                        <option value="phaseText" selected>时期艺术字</option>
                        <option value="phaseBar">时期条整体</option>
                        <option value="cardId">卡号</option>
                        <option value="starBox">星星区域</option>
                        <option value="opsNum">点数数字</option>
                        <option value="imageBox">图片区域</option>
                        <option value="mainImage">图片内容</option>
                        <option value="titleBar">标题栏</option>
                        <option value="titleText">标题文字</option>
                        <option value="textArea">正文区域</option>
                        <option value="txtPre">前置文字</option>
                        <option value="txtEvent">事件文字</option>
                        <option value="txtPost">后置文字</option>
                        <option value="footerRem">移出游戏文字</option>
                        <option value="footerSpecial">特殊状态横幅</option>
                        <option value="footerHold">不可持牌横幅</option>
                    </select>
                    <label style="width:auto; font-weight: normal;">
                        <input type="checkbox" id="tuneDrag"> 拖拽调整
                    </label>
                </div>
            </div>

            <div class="form-row"><label>X(左右)</label>
                <div class="input-wrap tuner-inline">
                    <input type="range" id="tuneX" min="-400" max="400" step="1" value="0">
                    <input type="number" id="tuneXNum" min="-400" max="400" step="1" value="0">
                </div>
            </div>
            <div class="form-row"><label>Y(上下)</label>
                <div class="input-wrap tuner-inline">
                    <input type="range" id="tuneY" min="-200" max="200" step="1" value="0">
                    <input type="number" id="tuneYNum" min="-200" max="200" step="1" value="0">
                </div>
            </div>
            <div class="form-row"><label>缩放</label>
                <div class="input-wrap tuner-inline">
                    <input type="range" id="tuneScale" min="0.2" max="3" step="0.01" value="1">
                    <input type="number" id="tuneScaleNum" min="0.2" max="3" step="0.01" value="1">
                </div>
            </div>

            <div class="form-row">
                <label>操作</label>
                <div class="input-wrap tuner-actions">
                    <button type="button" class="btn-mini" id="btnTuneReset">重置当前</button>
                    <button type="button" class="btn-mini" id="btnTuneApplyAllEra">应用到三时代</button>
                </div>
            </div>


            <div id="panel-normal">
                <div class="section-title">事件内容</div>
                <div class="form-row"><label>标题</label><div class="input-wrap"><input type="text" id="title" value="社会主义老大哥"></div></div>
                <div class="form-row"><label>图片</label><div class="input-wrap">
                    <input type="file" id="imgUpload" accept="image/*">
                    <select id="imgFit" style="width: 100px;">
                        <option value="contain">完整显示</option>
                        <option value="cover" selected>填满裁切</option>
                    </select>
                </div></div>
                
                <div class="form-row"><label>字体大小</label>
                    <div class="input-wrap">
                        <select id="fontSize">
                            <option value="24">24px</option><option value="26">26px</option><option value="28">28px</option>
                            <option value="30" selected>30px (标准)</option><option value="32">32px</option>
                            <option value="34">34px</option><option value="36">36px</option><option value="38">38px</option><option value="40">40px</option>
                            <option value="42">42px (计分推荐)</option><option value="44">44px</option>
                        </select>
                    </div>
                </div>
                
                <div style="margin-top:10px;">
                    <button type="button" id="btnBold" class="btn-bold-tool">B 加粗选中文字 (添加 **)</button>
                </div>
                <div class="info-box">* 选中下方文本框中的文字后点击按钮即可。</div>

                <div class="form-row"><label>前置</label><div class="input-wrap"><textarea id="txtPre" rows="2"></textarea></div></div>
                <div class="form-row"><label>事件</label><div class="input-wrap"><textarea id="txtEvent" rows="4">在此区域移除所有美国影响力。</textarea></div></div>
                <div class="form-row"><label>后置</label><div class="input-wrap"><textarea id="txtPost" rows="2"></textarea></div></div>
            </div>

            <div id="panel-scoring" class="hidden" style="display:none !important;">
                <div class="section-title">计分内容</div>
                <div class="form-row">
                    <label>样式</label>
                    <div class="input-wrap">
                        <label><input type="radio" name="scoreStyle" value="single"> 单色</label>
                        <label><input type="radio" name="scoreStyle" value="dual" checked> 双色(斜)</label>
                    </div>
                </div>
                <div class="form-row">
                    <label>布局</label>
                    <div class="input-wrap">
                        <label><input type="checkbox" id="chkStretch"> 自动拉伸行高填满</label>
                    </div>
                </div>

    <script type="module">
        import { domToPng } from 'https://esm.sh/modern-screenshot';

        // ==================== DOM Helpers ====================
        // 统一使用 ID 查询，减少重复代码（不改变逻辑）
        const $ = (id) => document.getElementById(id);
        const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));


        // ==================== 配置常量 ====================
        const Config = {
            colors: ['#B3BBBB', '#737F85', '#2A2C2C'],
            assetsKeys: ['bg0','bg1','bg2','tx0','tx1','tx2','s0','s1','s2'],
            defaultAssets: {
                bg0: 'templates/bg-early.png',
                bg1: 'templates/bg-mid.png',
                bg2: 'templates/bg-late.png',
                tx0: 'templates/title-early.png',
                tx1: 'templates/title-mid.png',
                tx2: 'templates/title-late.png',
                s0: 'templates/star-ussr.png',
                s1: 'templates/star-usa.png',
                s2: 'templates/star-neutral.png'
            },
            storagePrefix: 'ts_release_'
        };

        // ==================== 资源管理模块 ====================
        const Assets = {
            data: {},
            userImg: null,

            init() {
                Config.assetsKeys.forEach(k => {
                    const d = localStorage.getItem(Config.storagePrefix + k);
                    if(d) this.data[k] = d;
                });
            },

            load(key, file, callback) {
                if(!file) return;
                const r = new FileReader();
                r.onload = e => {
                    this.data[key] = e.target.result;
                    localStorage.setItem(Config.storagePrefix + key, e.target.result);
                    if(callback) callback();
                };
                r.readAsDataURL(file);
            },

            loadUserImage(file, callback) {
                if(!file) return;
                const r = new FileReader();
                r.onload = e => {
                    this.userImg = e.target.result;
                    if(callback) callback();
                }
                r.readAsDataURL(file);
            },

            get(key) { return this.data[key] || Config.defaultAssets[key] || null; },

            clearCustom(key, callback) {
                delete this.data[key];
                localStorage.removeItem(Config.storagePrefix + key);
                if(callback) callback();
            },

            clearAllCustom(callback) {
                Config.assetsKeys.forEach(k => this.clearCustom(k));
                if(callback) callback();
            }
        };

        
        // ==================== 布局微调模块 (Layout Tuner) ====================
        const LayoutTuner = {
            storageKey: Config.storagePrefix + 'layout_tuner_v2',
            data: {},
            ui: null,
            dragState: null,

            load() {
                const raw = localStorage.getItem(this.storageKey);
                if (!raw) return;
                try {
                    const parsed = JSON.parse(raw);
                    if (parsed && typeof parsed === 'object') this.data = parsed;
                } catch (e) {
                    console.warn('LayoutTuner: localStorage JSON parse failed, reset.', e);
                    this.data = {};
                }
            },

            save() {
                try {
                    localStorage.setItem(this.storageKey, JSON.stringify(this.data));
                } catch (e) {
                    console.warn('LayoutTuner: localStorage save failed.', e);
                }
            },

            makeKey(target, type, era) {
                return `${target}|${type}|${era}`;
            },

            clamp(num, min, max) {
                const n = Number(num);
                if (Number.isNaN(n)) return min;
                return Math.min(max, Math.max(min, n));
            },

            getDefault(target, type, era) {
                if (target === 'phaseText' && type === 'normal') {
                    const phaseDefaults = {
                        '0': { x: -45, y: 0, scale: 1.5 },
                        '1': { x: -70, y: 0, scale: 1.5 },
                        '2': { x: -60, y: 0, scale: 1.5 }
                    };
                    return phaseDefaults[String(era)] || { x: 0, y: 0, scale: 1 };
                }
                return { x: 0, y: 0, scale: 1 };
            },

            get(target, type, era) {
                const k = this.makeKey(target, type, era);
                const v = this.data[k];
                const base = this.getDefault(target, type, era);
                if (!v || typeof v !== 'object') return base;
                return {
                    x: Number.isFinite(Number(v.x)) ? Number(v.x) : base.x,
                    y: Number.isFinite(Number(v.y)) ? Number(v.y) : base.y,
                    scale: Number.isFinite(Number(v.scale)) ? Number(v.scale) : base.scale
                };
            },

            set(target, type, era, patch) {
                const cur = this.get(target, type, era);
                const next = { ...cur, ...patch };

                // 轻微规整 & 限制范围
                next.x = Math.round(this.clamp(next.x, -2000, 2000));
                next.y = Math.round(this.clamp(next.y, -2000, 2000));
                next.scale = Math.round(this.clamp(next.scale, 0.05, 10) * 100) / 100;

                this.data[this.makeKey(target, type, era)] = next;
                this.save();
                return next;
            },

            reset(target, type, era) {
                delete this.data[this.makeKey(target, type, era)];
                this.save();
            },

            applyToAllEras(target, type, fromEra) {
                const base = this.get(target, type, fromEra);
                ['0', '1', '2'].forEach(e => this.set(target, type, e, base));
            },

            copyToOtherType(target, type, era) {
                const base = this.get(target, type, era);
                const otherType = (type === 'scoring') ? 'normal' : 'scoring';
                this.set(target, otherType, era, base);
            },

            getInlineStyle(target, type, era) {
                const t = this.get(target, type, era);
                const x = Number.isFinite(t.x) ? t.x : 0;
                const y = Number.isFinite(t.y) ? t.y : 0;
                const s = Number.isFinite(t.scale) ? t.scale : 1;
                return `transform: translate(${x}px, ${y}px) scale(${s}); transform-origin: center center;`;
            },

            // 读取预览缩放比例（用于拖拽时换算真实像素）
            getPreviewScale() {
                const el = $('preview-scale-container');
                if (!el) return 1;
                const tr = getComputedStyle(el).transform;
                if (!tr || tr === 'none') return 1;

                const m3 = tr.match(/^matrix3d\((.+)\)$/);
                if (m3) {
                    const parts = m3[1].split(',').map(v => parseFloat(v.trim()));
                    const a = parts[0];
                    return Number.isFinite(a) && a !== 0 ? Math.abs(a) : 1;
                }
                const m2 = tr.match(/^matrix\((.+)\)$/);
                if (m2) {
                    const parts = m2[1].split(',').map(v => parseFloat(v.trim()));
                    const a = parts[0];
                    return Number.isFinite(a) && a !== 0 ? Math.abs(a) : 1;
                }
                return 1;
            },

            getCurrentTarget() {
                return this.ui?.target?.value || 'phaseText';
            },

            isDragEnabled() {
                return !!this.ui?.drag?.checked;
            },

            // 同步 UI 控件到当前 type/era 的保存值
            syncUIFromState(state) {
                if (!this.ui) return;
                const target = this.getCurrentTarget();
                const t = this.get(target, state.type, state.era);

                // 避免正在手动输入 number 时被强制覆盖
                const activeId = document.activeElement && document.activeElement.id;

                if (activeId !== 'tuneXNum') this.ui.xNum.value = t.x;
                if (activeId !== 'tuneX') this.ui.x.value = t.x;

                if (activeId !== 'tuneYNum') this.ui.yNum.value = t.y;
                if (activeId !== 'tuneY') this.ui.y.value = t.y;

                if (activeId !== 'tuneScaleNum') this.ui.sNum.value = t.scale;
                if (activeId !== 'tuneScale') this.ui.s.value = t.scale;
            },

            // 从 UI 读取并写入存储
            writeFromUI(state) {
                if (!this.ui) return;
                const target = this.getCurrentTarget();

                const x = parseFloat(this.ui.x.value);
                const y = parseFloat(this.ui.y.value);
                const s = parseFloat(this.ui.s.value);

                return this.set(target, state.type, state.era, { x, y, scale: s });
            },

            highlightTarget() {
                const node = $('card-node');
                if (!node) return;

                node.querySelectorAll('.tune-highlight').forEach(el => el.classList.remove('tune-highlight'));

                if (!this.isDragEnabled()) return;

                const targetKey = this.getCurrentTarget();
                const targetEl = node.querySelector(`[data-tune-key="${targetKey}"]`);
                if (targetEl) targetEl.classList.add('tune-highlight');
            },

            bindUI() {
                const ui = {
                    target: $('tuneTarget'),
                    drag: $('tuneDrag'),
                    x: $('tuneX'),
                    xNum: $('tuneXNum'),
                    y: $('tuneY'),
                    yNum: $('tuneYNum'),
                    s: $('tuneScale'),
                    sNum: $('tuneScaleNum'),
                    btnReset: $('btnTuneReset'),
                    btnAllEra: $('btnTuneApplyAllEra'),
                    btnCopyType: $('btnTuneCopyType')
                };

                // 若用户删掉了面板，直接跳过
                if (!ui.target || !ui.x || !ui.y || !ui.s) return;

                this.ui = ui;

                const stateNow = () => App.getState();

                const syncPair = (rangeEl, numEl) => {
                    rangeEl.addEventListener('input', (e) => {
                        numEl.value = rangeEl.value;
                    }, { capture: true });

                    numEl.addEventListener('input', (e) => {
                        rangeEl.value = numEl.value;
                    }, { capture: true });
                };

                syncPair(ui.x, ui.xNum);
                syncPair(ui.y, ui.yNum);
                syncPair(ui.s, ui.sNum);

                const onAnyInput = (e) => {
                    // 拦截默认的通用 render 监听，避免重复渲染/状态先后顺序问题
                    e.stopPropagation();

                    const st = stateNow();
                    this.writeFromUI(st);
                    App.render();
                    this.highlightTarget();
                };

                // 使用 capture 确保先于 App 的通用监听运行
                ui.x.addEventListener('input', onAnyInput, { capture: true });
                ui.xNum.addEventListener('input', onAnyInput, { capture: true });
                ui.y.addEventListener('input', onAnyInput, { capture: true });
                ui.yNum.addEventListener('input', onAnyInput, { capture: true });
                ui.s.addEventListener('input', onAnyInput, { capture: true });
                ui.sNum.addEventListener('input', onAnyInput, { capture: true });

                ui.target.addEventListener('change', (e) => {
                    e.stopPropagation();
                    const st = stateNow();
                    this.syncUIFromState(st);
                    App.render();
                    this.highlightTarget();
                }, { capture: true });

                ui.drag.addEventListener('change', (e) => {
                    e.stopPropagation();
                    this.highlightTarget();
                }, { capture: true });

                // 操作按钮
                if (ui.btnReset) {
                    ui.btnReset.addEventListener('click', () => {
                        const st = stateNow();
                        const target = this.getCurrentTarget();
                        this.reset(target, st.type, st.era);
                        this.syncUIFromState(st);
                        App.render();
                        this.highlightTarget();
                    });
                }
                if (ui.btnAllEra) {
                    ui.btnAllEra.addEventListener('click', () => {
                        const st = stateNow();
                        const target = this.getCurrentTarget();
                        this.applyToAllEras(target, st.type, st.era);
                        this.syncUIFromState(st);
                        App.render();
                        this.highlightTarget();
                    });
                }
                if (ui.btnCopyType) {
                    ui.btnCopyType.addEventListener('click', () => {
                        const st = stateNow();
                        const target = this.getCurrentTarget();
                        this.copyToOtherType(target, st.type, st.era);
                        // 当前类型不变，因此 UI 不变；只提示用户即可（不强制 alert 也可）
                        alert('已复制到另一类型（切换“类型”即可看到效果）。');
                    });
                }
            },

            bindDrag() {
                const cardNode = $('card-node');
                if (!cardNode) return;

                cardNode.addEventListener('pointerdown', (e) => {
                    if (!this.isDragEnabled()) return;

                    const targetKey = this.getCurrentTarget();
                    const targetEl = e.target.closest && e.target.closest(`[data-tune-key="${targetKey}"]`);
                    if (!targetEl) return;

                    e.preventDefault();

                    const st = App.getState();
                    const cur = this.get(targetKey, st.type, st.era);
                    const scale = this.getPreviewScale();

                    this.dragState = {
                        pointerId: e.pointerId,
                        startClientX: e.clientX,
                        startClientY: e.clientY,
                        baseX: cur.x,
                        baseY: cur.y,
                        type: st.type,
                        era: st.era,
                        target: targetKey,
                        previewScale: scale || 1
                    };

                    const onMove = (ev) => {
                        if (!this.dragState) return;
                        if (ev.pointerId !== this.dragState.pointerId) return;

                        const dx = (ev.clientX - this.dragState.startClientX) / (this.dragState.previewScale || 1);
                        const dy = (ev.clientY - this.dragState.startClientY) / (this.dragState.previewScale || 1);

                        const next = this.set(this.dragState.target, this.dragState.type, this.dragState.era, {
                            x: this.dragState.baseX + dx,
                            y: this.dragState.baseY + dy
                        });

                        // 同步面板数值
                        if (this.ui) {
                            this.ui.x.value = next.x;
                            this.ui.xNum.value = next.x;
                            this.ui.y.value = next.y;
                            this.ui.yNum.value = next.y;
                        }

                        App.render();
                        this.highlightTarget();
                    };

                    const onUp = (ev) => {
                        if (!this.dragState) return;
                        if (ev.pointerId !== this.dragState.pointerId) return;

                        window.removeEventListener('pointermove', onMove, { capture: true });
                        window.removeEventListener('pointerup', onUp, { capture: true });
                        this.dragState = null;
                    };

                    window.addEventListener('pointermove', onMove, { capture: true });
                    window.addEventListener('pointerup', onUp, { capture: true });
                }, { capture: true });
            },

            // 在每次渲染后执行：同步面板、刷新高亮
            afterRender(state) {
                if (!this.ui) return;
                this.syncUIFromState(state);
                this.highlightTarget();
            },

            init() {
                this.load();
                this.bindUI();
                this.bindDrag();
            }
        };


// ==================== 渲染器模块 ====================
        const Renderer = {
            // 将文本中的 **XX** 转换为加粗标签
            /**
 * 将编辑框文本渲染为 HTML：
 * - \n -> <br>
 * - **xxx** -> <span class="bold">xxx</span>
 * - 可选：仅将“数字”加粗（不影响中文）
 */
formatText(str, opts = { boldDigits: false }) {
    if (!str) return '';
    let html = String(str)
        .replace(/\n/g, '<br>')
        .replace(/\*\*(.*?)\*\*/g, '<span class="bold">$1</span>');

    if (opts.boldDigits) {
        // 将连续数字包裹为加粗 span（例：1VP、123、存在: 3）
        html = html.replace(/(\d+)/g, '<span class="num-bold">$1</span>');
    }
    return html;
},

            build(state) {
                const isScoring = state.type === 'scoring';
                const bgUrl = Assets.get('bg' + state.era);
                
                // 1. 容器样式
                const node = $('card-node');
                node.className = `card-frame ${isScoring ? 'type-scoring' : 'type-event'} phase-${state.era}`;
                node.style.backgroundImage = bgUrl ? `url(${bgUrl})` : 'none';
                node.style.backgroundColor = bgUrl ? 'transparent' : (isScoring ? '#ffffff' : '#f4f4f4');
                node.style.backgroundSize = '100% 100%';

                let html = '';

                // 2. 纹理与基础信息
                html += `<div class="texture-overlay"></div>`;
                const idStyle = LayoutTuner.getInlineStyle('cardId', state.type, state.era);
                html += `<div class="el-id" data-tune-key="cardId" style="${idStyle}"><span class="id-bold">${state.cardId}</span></div>`;

                // 3. 阶段条
                const phaseStyle = LayoutTuner.getInlineStyle('phaseText', state.type, state.era);
                const phaseImg = Assets.get('tx' + state.era) ? 
                    `<img src="${Assets.get('tx' + state.era)}" class="el-phase-img" data-tune-key="phaseText" draggable="false" style="${phaseStyle}">` 
                    : '';
                const phaseBarStyle = LayoutTuner.getInlineStyle('phaseBar', state.type, state.era);
                html += `<div class="el-phase-bar" data-tune-key="phaseBar" style="background-color:${Config.colors[state.era]}; ${phaseBarStyle}">${phaseImg}</div>`;

                // 4. 星星与点数
                const starUrl = Assets.get('s' + state.side);
                const opsDisplay = (state.ops === '-' || state.ops === '') ? '' : state.ops;
                const opsNumClass = (String(state.ops).trim() === '4') ? ' ops-num-4' : '';
                const starStyle = LayoutTuner.getInlineStyle('starBox', state.type, state.era);
                const opsStyle = LayoutTuner.getInlineStyle('opsNum', state.type, state.era);
                html += `<div class="el-star-box" data-tune-key="starBox" style="${starStyle}">
                            ${starUrl ? `<img src="${starUrl}" class="el-star-img" draggable="false">` : ''}
                            <div class="el-ops-num${opsNumClass}" data-tune-key="opsNum" style="${opsStyle}">${opsDisplay}</div>
                         </div>`;

                // 5. 内容分发
                if (isScoring) {
                    html += this.buildScoringContent(state);
                } else {
                    html += this.buildEventContent(state);
                }

                
// 6. 底部状态
html += '<div class="footer-container">';

// 顺序固定（自上而下）：
// 1) 作为事件打出后移出游戏
// 2) 特殊状态（自定义）
// 3) 不可作为最后持牌
if(state.isCont || state.isRem) {
    html += `<div class="el-footer-rem-text" data-tune-key="footerRem" style="${LayoutTuner.getInlineStyle('footerRem', state.type, state.era)}">作为事件打出后移出游戏</div>`;
}

if(state.isSpecial) {
    const t = (state.specialText || '').trim();
    if (t) {
        html += `<div class="el-footer-hold-banner" data-tune-key="footerSpecial" style="${LayoutTuner.getInlineStyle('footerSpecial', state.type, state.era)}">${t}</div>`;
    }
}

if(state.isHold) {
    html += `<div class="el-footer-hold-banner" data-tune-key="footerHold" style="${LayoutTuner.getInlineStyle('footerHold', state.type, state.era)}">不可作为最后持牌</div>`;
}

html += '</div>';

                node.innerHTML = html;
            },

            buildEventContent(state) {
                // 图片
                const imgFit = $('imgFit').value; 
                const imgBoxClass = (imgFit === 'contain') ? ' img-fit-contain' : ' img-fit-cover';
                const imageStyle = LayoutTuner.getInlineStyle('mainImage', state.type, state.era);
                const imgContent = Assets.userImg ? 
                    `<img src="${Assets.userImg}" class="el-main-img" data-tune-key="mainImage" draggable="false" style="object-fit:${imgFit}; ${imageStyle}">` : 
                    `<div class="el-img-placeholder" id="placeholder-trigger" data-tune-key="mainImage" style="${imageStyle}">📷 点击上传</div>`;
                const imgBoxStyle = LayoutTuner.getInlineStyle('imageBox', state.type, state.era);
                let html = `<div class="el-img-box${imgBoxClass}" data-tune-key="imageBox" style="${imgBoxStyle}">${imgContent}</div>`;

                // 标题
                const hasStar = (state.isCont || state.isRem);
                const fullTitle = state.title + (hasStar ? '*' : '');
                const titleStyle = LayoutTuner.getInlineStyle('titleText', state.type, state.era);
                const titleBarStyle = LayoutTuner.getInlineStyle('titleBar', state.type, state.era);
                html += `<div class="el-title-bar" data-tune-key="titleBar" style="${titleBarStyle}">
                            <div class="el-title-wrapper" data-tune-key="titleText" style="${titleStyle}">
                                <div class="el-title-text">${fullTitle}</div>
                                <div class="el-title-line" style="visibility:${state.isCont?'visible':'hidden'}"></div>
                            </div>
                         </div>`;

                // 文本
                const fs = state.fontSize + 'px';
                const textAreaStyle = LayoutTuner.getInlineStyle('textArea', state.type, state.era);
                const txtPreStyle = LayoutTuner.getInlineStyle('txtPre', state.type, state.era);
                const txtEventStyle = LayoutTuner.getInlineStyle('txtEvent', state.type, state.era);
                const txtPostStyle = LayoutTuner.getInlineStyle('txtPost', state.type, state.era);
                html += `<div class="el-text-area" data-tune-key="textArea" style="${textAreaStyle}">
                            <div class="txt-pre txt-block" data-tune-key="txtPre" style="font-size:${fs}; ${txtPreStyle}">${this.formatText(state.txtPre, { boldDigits: true })}</div>
                            <div class="txt-event txt-block" data-tune-key="txtEvent" style="font-size:${fs}; ${txtEventStyle}">${this.formatText(state.txtEvent, { boldDigits: true })}</div>
                            <div class="txt-post txt-block" data-tune-key="txtPost" style="font-size:${fs}; ${txtPostStyle}">${this.formatText(state.txtPost, { boldDigits: true })}</div>
                         </div>`;
                return html;
            },

            buildScoringContent(state) {
                const headerBg = state.scoreStyle === 'dual' 
                    ? `linear-gradient(to bottom right, ${state.c2} 0%, ${state.c2} 50%, ${state.c1} 50%, ${state.c1} 100%)`
                    : state.c1;
                
                const titleStyle = LayoutTuner.getInlineStyle('titleText', state.type, state.era);

                let html = `<div class="el-scoring-box">
                            <div class="score-row score-header" style="background:${headerBg}">
                                <div class="score-header-inner" data-tune-key="titleText" style="${titleStyle}">
                                    <div>${state.scTitle}</div>
                                    <div class="score-sub">${state.scSub}</div>
                                </div>
                            </div>`;
                
                const fs = state.fontSize + 'px';
                state.scoreRows.forEach((rowText, i) => {
                    const rowBg = (i % 2 === 0) ? state.c2 : state.c1;
                    const growStyle = state.stretch ? 'flex-grow:1;' : 'flex-grow:0;';
                    html += `<div class="score-row score-item" style="background:${rowBg}; ${growStyle}; font-size:${fs}">
                                ${this.formatText(rowText)}
                             </div>`;
                });
                html += `</div>`;
                return html;
            }
        };

        // ==================== 应用控制模块 ====================
        const App = {
            scoreRows: ["存在: 3", "支配: 7", "控制: 自动获胜"],

            init() {
                Assets.init();
                this.bindEvents();
                this.renderScoreRowsInput();
                LayoutTuner.init();
                this.updateUI(); // 触发初始渲染
            },

            // 获取当前界面所有状态
            getState() {
                const type = $('type').value;
                return {
                    type: type,
                    era: $('era').value,
                    side: $('side').value,
                    cardId: $('cardId').value,
                    ops: $('ops').value,
                    fontSize: $('fontSize').value,
                    
                    // Event properties
                    title: $('title').value,
                    txtPre: $('txtPre').value,
                    txtEvent: $('txtEvent').value,
                    txtPost: $('txtPost').value,
                    
                    // Scoring properties
                    scTitle: $('scTitle').value,
                    scSub: $('scSub').value,
                    c1: $('c1').value,
                    c2: $('c2').value,
                    scoreStyle: document.querySelector('input[name="scoreStyle"]:checked')?.value || 'dual',
                    stretch: $('chkStretch').checked,
                    scoreRows: this.scoreRows,

                    // Flags
                    isCont: $('chkCont').checked,
                    isRem: $('chkRem').checked,
                    isHold: $('chkHold').checked,
                    // [NEW] 特殊状态
                    isSpecial: $('chkSpecial') ? $('chkSpecial').checked : false,
                    specialText: $('specialText') ? $('specialText').value : ''
                };
            },

            updateUI() {
                const type = $('type').value;
                const isScoring = false; // 正式版暂时屏蔽计分牌，仅保留事件牌
                
                $('panel-normal').classList.remove('hidden');
                $('panel-scoring').classList.add('hidden');
                
                this.render();
            },

            render() {
                const state = this.getState();
                Renderer.build(state);
                LayoutTuner.afterRender(state);
                
                // 绑定 placeholder 点击事件
                const trigger = $('placeholder-trigger');
                if(trigger) {
                    trigger.onclick = () => $('imgUpload').click();
                }
            },

            bindEvents() {
                // 1. 通用输入监听
                const inputs = $$('input, textarea, select');
                inputs.forEach(el => {
                    if(el.type === 'file') return; // 文件单独处理
                    const eventType = (el.type === 'checkbox' || el.type === 'radio' || el.tagName === 'SELECT') ? 'change' : 'input';
                    
                    el.addEventListener(eventType, (e) => {
                        // 特殊逻辑：互斥检查
                        if(e.target.id === 'chkCont' && e.target.checked) $('chkRem').checked = false;
                        if(e.target.id === 'chkRem' && e.target.checked) $('chkCont').checked = false;
                        
                        if(e.target.id === 'type') this.updateUI();
                        else this.render();
                    });
                });

                // 2. 图片上传
                $('imgUpload').addEventListener('change', (e) => {
                    Assets.loadUserImage(e.target.files[0], () => this.render());
                });

                // 3. 素材替换上传
                $$('input[data-asset]').forEach(input => {
                    input.addEventListener('change', (e) => {
                        Assets.load(e.target.dataset.asset, e.target.files[0], () => this.render());
                    });
                });

                const btnAssetsReset = $('btnAssetsReset');
                if (btnAssetsReset) {
                    btnAssetsReset.addEventListener('click', () => {
                        Assets.clearAllCustom(() => this.render());
                        $$('input[data-asset]').forEach(input => input.value = '');
                        alert('已恢复 templates 文件夹中的默认素材。');
                    });
                }

                // 4. 按钮事件
                $('btnAddRow').addEventListener('click', () => {
                    if(this.scoreRows.length < 6) {
                        this.scoreRows.push("新条目: 1VP");
                        this.renderScoreRowsInput();
                        this.render();
                    }
                });
                
                $('btnDelRow').addEventListener('click', () => {
                    if(this.scoreRows.length > 1) {
                        this.scoreRows.pop();
                        this.renderScoreRowsInput();
                        this.render();
                    }
                });

                $('btnBold').addEventListener('mousedown', (e) => {
                    e.preventDefault(); // 防止失去焦点
                    this.insertBoldTags();
                });

                $('btnDownload').addEventListener('click', () => this.download());
            },

            renderScoreRowsInput() {
                const container = $('score-rows-container');
                container.innerHTML = '';
                this.scoreRows.forEach((val, idx) => {
                    const div = document.createElement('div');
                    div.className = 'dynamic-row-item';
                    const ta = document.createElement('textarea');
                    ta.rows = 1;
                    ta.value = val;
                    ta.style.resize = 'vertical';
                    ta.addEventListener('input', (e) => {
                        this.scoreRows[idx] = e.target.value;
                        this.render();
                    });
                    div.appendChild(ta);
                    container.appendChild(div);
                });
            },

            insertBoldTags() {
                const ids = ['txtPre', 'txtEvent', 'txtPost'];
                let activeEle = null;
                
                if (ids.includes(document.activeElement.id)) {
                    activeEle = document.activeElement;
                }

                if (!activeEle) {
                    alert("请先点击 前置、事件 或 后置 文本框，并选中需要加粗的文字。");
                    return;
                }

                const start = activeEle.selectionStart;
                const end = activeEle.selectionEnd;
                const text = activeEle.value;

                if (start === end) {
                    alert("未选中文本！请先用鼠标框选要加粗的字。");
                    return;
                }

                activeEle.value = text.substring(0, start) + "**" + text.substring(start, end) + "**" + text.substring(end);
                this.render(); 
                
                activeEle.setSelectionRange(start, end + 4);
            },

            async download() {
                const btn = $('btnDownload');
                const originalText = btn.textContent;
                btn.textContent = '生成中...';
                btn.disabled = true;

                try {
                    const originalNode = $('card-node');
                    // 克隆节点以避免影响当前显示，并移出视口
                    const clone = originalNode.cloneNode(true);

                    // [NEW] 导出时移除微调工具的高亮边框，避免误导出
                    clone.querySelectorAll('.tune-highlight').forEach(el => el.classList.remove('tune-highlight'));
                    const container = document.createElement('div');
                    Object.assign(container.style, { position: 'absolute', top: '-9999px', left: '-9999px' });
                    container.appendChild(clone);
                    document.body.appendChild(container);

                    // 计算缩放比例 (Preview is 376px wide usually, original is 736px)
                    // 这里的 scale 设为 376/736 ≈ 0.51 或者保持 1 以获得高清大图
                    
                    const dataUrl = await domToPng(clone, {
                        scale: 1, // 输出全分辨率
                        quality: 1,
                        fetch: { bypassingCache: true, requestInit: { mode: 'cors', credentials: 'omit' } }
                    });

                    
                    document.body.removeChild(container);

                    // [NEW] 导出尺寸压缩到 376x523（便于导入桌游模拟器等）
                    const targetW = 376;
                    const targetH = 523;

                    const resizedDataUrl = await new Promise((resolve, reject) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = targetW;
                            canvas.height = targetH;
                            const ctx = canvas.getContext('2d');
                            ctx.imageSmoothingEnabled = true;
                            ctx.imageSmoothingQuality = 'high';
                            ctx.drawImage(img, 0, 0, targetW, targetH);
                            resolve(canvas.toDataURL('image/png', 1));
                        };
                        img.onerror = (e) => reject(new Error('图片缩放失败'));
                        img.src = dataUrl;
                    });

                    const link = document.createElement('a');

                    const state = this.getState();
                    const titleVal = state.title || state.scTitle || 'card';
                    link.download = `TS_${titleVal.replace(/[\\/:*?"<>|]/g, '_')}.png`;
                    link.href = resizedDataUrl;
                    link.click();

                } catch (err) {
                    console.error("截图失败:", err);
                    alert('截图失败: ' + err.message);
                } finally {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            }
        };

        // 启动应用
        window.onload = () => App.init();
    </script>
</body>
</html>
